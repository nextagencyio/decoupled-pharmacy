enum MenuAvailable {
  MAIN
}

type Menu implements MenuInterface {
  id: ID!
  uuid: ID!
  items: [MenuItem!]!
  name: String!
}

interface MenuInterface {
  id: ID!
  uuid: ID!
  items: [MenuItem!]!
  name: String!
}

type MenuItem {
  id: ID!
  title: String!
  description: String
  url: String
  langcode: Language!
  internal: Boolean!
  expanded: Boolean!
  attributes: MenuItemAttributes!
  children: [MenuItem!]!
  route: RouteUnion
}

type MenuItemAttributes {
  class: String
}

union RouteUnion = RouteInternal | RouteExternal

type RouteInternal implements Route {
  url: String!
  internal: Boolean!
  breadcrumbs: [Link!]
  entity: RouteEntityUnion
}

interface Route {
  url: String!
  internal: Boolean!
}

type Link {
  title: String
  url: String
  internal: Boolean!
}

union RouteEntityUnion = NodeHealthTip | NodeHomepage | NodeLocation | NodePage | NodeService

type RouteExternal implements Route {
  url: String!
  internal: Boolean!
}

type SchemaInformation {
  description: String
  home: String
  name: String
  slogan: String
  version: String
}

