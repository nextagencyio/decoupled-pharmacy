type NodeService implements NodeInterface & EdgeNode {
  id: ID!
  uuid: ID!
  body: TextSummary
  changed: DateTime!
  created: DateTime!
  image: Image
  langcode: Language!
  path: String
  promote: Boolean!
  status: Boolean!
  sticky: Boolean!
