}

interface ParagraphInterface {
  id: ID!
  uuid: ID!
  created: DateTime!
  langcode: Language!
  status: Boolean!
}

type NodeLocation implements NodeInterface & EdgeNode {
  id: ID!
  uuid: ID!
  address: String
  body: TextSummary
  changed: DateTime!
  created: DateTime!
  hours: String
  image: Image
  langcode: Language!
  path: String
  phone: String
  promote: Boolean!
  status: Boolean!
  sticky: Boolean!
  title: String!
}

type NodePage implements NodeInterface & EdgeNode {
  id: ID!
  uuid: ID!
  body: TextSummary
  changed: DateTime!
  created: DateTime!
  langcode: Language!
  path: String
  promote: Boolean!
  status: Boolean!
  sticky: Boolean!
  title: String!
